<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOHAS 2026 - Avaliacao</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="page-background" aria-hidden="true"></div>
    <img class="branch branch-login" src="assets/ramo.svg" alt="">
    <img class="branch branch-evaluation" src="assets/ramo.svg" alt="">

    <main class="app-shell">
        <section class="screen login-screen is-active" id="loginScreen" aria-labelledby="loginTitle">
            <div class="login-panel">
                <img class="brand-logo" src="assets/logoJOHAS.svg" alt="JOHAS">
                <h1 id="loginTitle">Login</h1>

                <form class="login-form" id="loginForm">
                    <label class="field">
                        <span class="sr-only">Nome</span>
                        <input type="text" id="usuario" name="usuario" placeholder="Nome" autocomplete="username" required>
                    </label>

                    <label class="field">
                        <span class="sr-only">Senha</span>
                        <input type="password" id="senha" name="senha" placeholder="Senha" autocomplete="current-password" required>
                    </label>

                    <p class="form-message" id="loginMessage" role="status" aria-live="polite"></p>

                    <button class="primary-button" type="submit">Entrar</button>
                </form>
            </div>
        </section>

        <section class="screen evaluation-screen" id="evaluationScreen" aria-labelledby="evaluationTitle">
            <header class="topbar">
                <img class="topbar-logo" src="assets/logoJOHAS.svg" alt="JOHAS">
                <button class="ghost-button" id="logoutButton" type="button">Sair</button>
            </header>

            <div class="evaluation-layout">
                <article class="poem-area" aria-live="polite">
                    <div class="poem-meta">
                        <span id="poemTurma">Turma</span>
                        <span id="poemId">Poema 1</span>
                    </div>

                    <h1 id="evaluationTitle">Carregando poema...</h1>
                    <p class="poem-author" id="poemAuthor"></p>
                    <div class="poem-text" id="poemText"></div>
                    <p class="loading-message" id="poemMessage" role="status"></p>
                </article>

                <aside class="score-panel" aria-labelledby="scoreTitle">
                    <h2 id="scoreTitle">Avaliação</h2>

                    <form id="evaluationForm">
                        <div class="score-grid">
                            <label class="score-field">
                                <span>Interpretação</span>
                                <input type="number" id="interpretacao" name="interpretacao" min="0" max="10" step="0.1" required>
                            </label>

                            <label class="score-field">
                                <span>Dicção</span>
                                <input type="number" id="diccao" name="diccao" min="0" max="10" step="0.1" required>
                            </label>

                            <label class="score-field">
                                <span>Memorização</span>
                                <input type="number" id="memorizacao" name="memorizacao" min="0" max="10" step="0.1" required>
                            </label>

                            <label class="score-field">
                                <span>Presença</span>
                                <input type="number" id="presenca" name="presenca" min="0" max="10" step="0.1" required>
                            </label>
                        </div>

                        <label class="comment-field">
                            <span>Observações</span>
                            <textarea id="observacoes" name="observacoes" rows="4"></textarea>
                        </label>

                        <p class="form-message" id="evaluationMessage" role="status" aria-live="polite"></p>

                        <button class="primary-button" type="submit">Enviar avaliação</button>
                    </form>
                </aside>
            </div>
        </section>
    </main>

    <footer class="site-footer">JOHAS 2026</footer>

    <script src="js/app.js"></script>
</body>
</html>
