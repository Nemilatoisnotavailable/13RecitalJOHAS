<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>JOHAS 2026 - Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/login.css">
</head>

<body>

    <div class="background"></div>

    <img class="ramo" src="assets/ramo.svg" alt="Ramo Decorativo">

    <main class="login-container">

        <img class="logo" src="assets/logoJOHAS.svg" alt="JOHAS">

        <h1>Login</h1>

        <form id="loginForm">

            <div class="input-box">
                <input
                    type="text"
                    id="usuario"
                    placeholder="Nome"
                    autocomplete="username"
                    required>
            </div>

            <div class="input-box">
                <input
                    type="password"
                    id="senha"
                    placeholder="Senha"
                    autocomplete="current-password"
                    required>
            </div>

            <button type="submit">
                Entrar
            </button>

        </form>

    </main>

    <footer>
        JOHAS 2026
    </footer>

    <script src="js/login.js"></script>

</body>

</html>
